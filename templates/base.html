<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>{% block title %}SmartFood Ops 360{% endblock %}</title>

  <script src="https://unpkg.com/htmx.org@1.9.10"></script>
  <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>
  <script src="https://cdn.tailwindcss.com"></script>

  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/tom-select@2.3.1/dist/css/tom-select.min.css">
  <script src="https://cdn.jsdelivr.net/npm/tom-select@2.3.1/dist/js/tom-select.complete.min.js"></script>

  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">

  <style>
    /* ── Design Tokens ──────────────────────────────────────── */
    :root {
      --bg:       #020617;   /* slate-950  – page background   */
      --surface:  #0f172a;   /* slate-900  – sidebar / panels  */
      --card:     #1e293b;   /* slate-800  – card background   */
      --card-alt: #263248;   /* slightly lighter card          */
      --border:   #334155;   /* slate-700  – default border    */
      --muted:    #64748b;   /* slate-500  – placeholder text  */
      --text:     #f8fafc;   /* slate-50   – primary text      */
      --sub:      #94a3b8;   /* slate-400  – secondary text    */
      --accent:   #2563eb;   /* blue-600   – primary action    */
      --accent-h: #1d4ed8;   /* blue-700   – hover             */
      --sidebar-w: 224px;
    }

    *, *::before, *::after { box-sizing: border-box; }

    body {
      font-family: 'Inter', system-ui, -apple-system, sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      -webkit-font-smoothing: antialiased;
    }

    /* Monospace for numbers/prices */
    .mono, .font-mono { font-family: 'JetBrains Mono', 'Fira Code', monospace; }

    /* ── Sidebar ─────────────────────────────────────────────── */
    #sidebar {
      position: fixed;
      top: 0; left: 0; bottom: 0;
      width: var(--sidebar-w);
      background: var(--surface);
      border-right: 1px solid var(--border);
      display: flex;
      flex-direction: column;
      z-index: 50;
      transition: transform .22s cubic-bezier(.4,0,.2,1);
      overflow-y: auto;
    }

    .sidebar-logo {
      padding: 1.125rem 1rem;
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      gap: .65rem;
      flex-shrink: 0;
    }

    .sidebar-section-label {
      font-size: .65rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: .08em;
      color: var(--muted);
      padding: .9rem 1rem .3rem;
    }

    .nav-item {
      display: flex;
      align-items: center;
      gap: .6rem;
      padding: .45rem .75rem;
      margin: .1rem .5rem;
      border-radius: .5rem;
      font-size: .825rem;
      font-weight: 500;
      color: var(--sub);
      text-decoration: none;
      transition: color .1s, background .1s;
      white-space: nowrap;
    }
    .nav-item:hover { color: var(--text); background: rgba(255,255,255,.05); }
    .nav-item.active { color: #fff; background: var(--accent); }
    .nav-item .nav-icon { width: 1.1rem; text-align: center; flex-shrink: 0; font-size: .9rem; }

    /* ── Main wrap ───────────────────────────────────────────── */
    #main-wrap {
      margin-left: var(--sidebar-w);
      min-height: 100vh;
    }

    #page-content {
      max-width: 1280px;
      margin: 0 auto;
      padding: 2rem 2rem;
    }

    /* ── Mobile: hamburger bar + overlay ─────────────────────── */
    #mobile-bar {
      display: none;
      align-items: center;
      gap: .75rem;
      padding: 0 1rem;
      height: 52px;
      border-bottom: 1px solid var(--border);
      background: var(--surface);
      position: sticky;
      top: 0;
      z-index: 40;
    }

    #sidebar-overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,.55);
      z-index: 49;
    }
    #sidebar-overlay.open { display: block; }

    @media (max-width: 768px) {
      #sidebar { transform: translateX(-110%); }
      #sidebar.open { transform: translateX(0); }
      #main-wrap { margin-left: 0; }
      #mobile-bar { display: flex; }
      #page-content { padding: 1rem; }
    }

    /* ── Inputs ──────────────────────────────────────────────── */
    input:not([type="checkbox"]):not([type="radio"]):not([type="range"]),
    select,
    textarea {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: .5rem;
      padding: .5rem .75rem;
      color: var(--text);
      min-height: 40px;
      width: 100%;
      font-family: inherit;
      font-size: .875rem;
      transition: border-color .15s, box-shadow .15s;
    }
    input:focus, select:focus, textarea:focus {
      border-color: var(--accent);
      outline: none;
      box-shadow: 0 0 0 3px rgba(37,99,235,.18);
    }
    input::placeholder, textarea::placeholder { color: var(--muted); }
    input.error, select.error, textarea.error {
      border-color: #f87171 !important;
      box-shadow: 0 0 0 3px rgba(248,113,113,.18) !important;
    }
    select:disabled { opacity: .4; cursor: not-allowed; }
    input[type="number"] { font-family: 'JetBrains Mono', monospace; }

    /* ── Buttons ─────────────────────────────────────────────── */
    .btn {
      display: inline-flex; align-items: center; justify-content: center;
      min-height: 38px; border-radius: .5rem; font-weight: 500;
      padding: 0 1rem; cursor: pointer; border: none;
      gap: .35rem; font-size: .825rem; font-family: inherit;
      transition: background .12s, border-color .12s, color .12s;
      white-space: nowrap;
    }
    .btn-primary   { background: var(--accent);   color: #fff; }
    .btn-primary:hover   { background: var(--accent-h); }
    .btn-secondary {
      background: transparent; color: var(--sub);
      border: 1px solid var(--border);
    }
    .btn-secondary:hover { border-color: var(--sub); color: var(--text); background: rgba(255,255,255,.04); }
    .btn-danger    { background: transparent; color: #f87171; border: 1px solid rgba(248,113,113,.35); }
    .btn-danger:hover    { background: rgba(248,113,113,.1); color: #fca5a5; }
    .btn-ghost     { background: transparent; color: var(--sub); border: none; }
    .btn-ghost:hover     { background: rgba(255,255,255,.06); color: var(--text); }
    .btn-black     { background: var(--text); color: var(--bg); border: none; }
    .btn-black:hover { background: #cbd5e1; }
    .btn:disabled  { opacity: .38; cursor: not-allowed; pointer-events: none; }
    .btn-sm        { min-height: 30px; padding: 0 .65rem; font-size: .775rem; }
    .btn-full      { width: 100%; }

    /* Icon-only micro button */
    .icon-btn {
      display: inline-flex; align-items: center; justify-content: center;
      min-width: 30px; min-height: 30px; border-radius: .375rem;
      background: transparent; border: none; cursor: pointer;
      transition: background .1s; color: var(--sub); font-size: .85rem;
    }
    .icon-btn:hover { background: rgba(255,255,255,.07); color: var(--text); }

    /* ── Cards ───────────────────────────────────────────────── */
    .card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: .75rem;
    }

    /* ── Segmented control (tabs) ────────────────────────────── */
    .seg-ctrl {
      display: inline-flex;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: .5rem;
      padding: 3px;
      gap: 2px;
    }
    .seg-btn {
      padding: .3rem .9rem;
      border-radius: .375rem;
      font-size: .8rem;
      font-weight: 500;
      color: var(--sub);
      cursor: pointer;
      border: none;
      background: transparent;
      transition: all .15s;
      white-space: nowrap;
      font-family: inherit;
      line-height: 1.5;
    }
    .seg-btn.active {
      background: var(--card);
      color: var(--text);
      box-shadow: 0 1px 3px rgba(0,0,0,.45);
    }
    .seg-btn:hover:not(.active) { color: var(--text); background: rgba(255,255,255,.04); }

    /* ── Badges ──────────────────────────────────────────────── */
    .badge {
      display: inline-flex; align-items: center; gap: .2rem;
      padding: .2rem .55rem; border-radius: .35rem;
      font-size: .7rem; font-weight: 500; line-height: 1.4;
    }
    .badge-slate  { background: rgba(148,163,184,.12); color: var(--sub); }
    .badge-blue   { background: rgba(37,99,235,.15);   color: #93c5fd; }
    .badge-green  { background: rgba(34,197,94,.15);   color: #86efac; }
    .badge-red    { background: rgba(248,113,113,.15); color: #fca5a5; }
    .badge-yellow { background: rgba(250,204,21,.15);  color: #fde047; }
    .badge-orange { background: rgba(251,146,60,.15);  color: #fdba74; }
    .badge-violet { background: rgba(167,139,250,.15); color: #c4b5fd; }

    /* Category-specific badge colors */
    [data-cat="Carnes"]        { color: #fca5a5; background: rgba(239,68,68,.15); }
    [data-cat="Vegetais"]      { color: #86efac; background: rgba(34,197,94,.15); }
    [data-cat="Temperos"]      { color: #fde047; background: rgba(234,179,8,.15); }
    [data-cat="Laticínios"]    { color: #fde68a; background: rgba(245,158,11,.15); }
    [data-cat="Carboidratos"]  { color: #fdba74; background: rgba(249,115,22,.15); }
    [data-cat="Embalagens"]    { color: #a5b4fc; background: rgba(99,102,241,.15); }
    [data-cat="Outros"]        { color: var(--sub); background: rgba(148,163,184,.12); }

    /* ── Inline edit field ───────────────────────────────────── */
    .field {
      background: var(--card); border: 1px solid var(--border);
      border-radius: .375rem; padding: .3rem .55rem; color: var(--text);
      min-height: 34px; font-family: inherit; font-size: .85rem;
    }
    .field:focus { border-color: var(--accent); outline: none; box-shadow: 0 0 0 3px rgba(37,99,235,.18); }

    /* ── Data tables ─────────────────────────────────────────── */
    .data-table { width: 100%; border-collapse: collapse; font-size: .875rem; }
    .data-table th {
      font-size: .68rem; font-weight: 600; text-transform: uppercase;
      letter-spacing: .06em; color: var(--muted);
      padding: .6rem 1rem; text-align: left;
      border-bottom: 1px solid var(--border);
    }
    .data-table td { padding: .7rem 1rem; border-bottom: 1px solid var(--border); }
    .data-table tr:last-child td { border-bottom: none; }
    .data-table tbody tr:hover td { background: rgba(255,255,255,.02); }

    /* ── Page section header ─────────────────────────────────── */
    .section-card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: .75rem;
      padding: 1.25rem;
    }

    /* ── HTMX / loading states ───────────────────────────────── */
    .htmx-request .htmx-indicator { display: inline-flex !important; }
    .htmx-indicator { display: none; }

    form.htmx-request .btn-primary,
    button.htmx-request { opacity: .55; pointer-events: none; }
    form.htmx-request .btn-primary::after { content: ' …'; }

    /* ── TomSelect overrides ─────────────────────────────────── */
    .ts-wrapper.single .ts-control {
      background: var(--card) !important;
      border: 1px solid var(--border) !important;
      border-radius: .5rem !important;
      color: var(--text) !important;
      min-height: 40px !important;
      padding: .5rem .75rem !important;
      box-shadow: none !important;
      font-family: inherit !important;
      font-size: .875rem !important;
    }
    .ts-wrapper.single.focus .ts-control {
      border-color: var(--accent) !important;
      box-shadow: 0 0 0 3px rgba(37,99,235,.18) !important;
    }
    .ts-dropdown {
      background: var(--card) !important;
      border: 1px solid var(--border) !important;
      border-radius: .5rem !important;
      color: var(--text) !important;
    }
    .ts-dropdown .option:hover, .ts-dropdown .option.active {
      background: rgba(37,99,235,.15) !important;
      color: #93c5fd !important;
    }
    .ts-dropdown .option.selected { background: rgba(37,99,235,.22) !important; }

    [x-cloak] { display: none !important; }

    /* ── Scrollbar ───────────────────────────────────────────── */
    ::-webkit-scrollbar { width: 6px; height: 6px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
    ::-webkit-scrollbar-thumb:hover { background: var(--muted); }
  </style>

  {% block extra_head %}{% endblock %}
</head>
<body>

  <!-- ══════════════════════════════════════════════════════════
       GLOBAL TOAST (top-right, Alpine)
  ═══════════════════════════════════════════════════════════ -->
  <div x-data="toastManager()"
       @show-toast.window="show($event.detail)"
       @htmx:after-request.window="onHtmx($event)"
       class="fixed top-4 right-4 z-[100] flex flex-col items-end gap-2 pointer-events-none"
       style="max-width:340px">
    <template x-for="t in toasts" :key="t.id">
      <div class="pointer-events-auto flex items-start gap-3 px-4 py-3 rounded-lg border text-sm font-medium leading-snug"
           :class="{
             'border-green-800/60 text-green-300': t.type === 'success',
             'border-red-800/60   text-red-300':   t.type === 'error',
             'border-blue-800/60  text-blue-300':  t.type === 'info',
           }"
           style="background:var(--card);box-shadow:0 8px 32px rgba(0,0,0,.5)"
           x-show="t.visible"
           x-transition:enter="transition ease-out duration-200"
           x-transition:enter-start="opacity-0 translate-x-3"
           x-transition:enter-end="opacity-100 translate-x-0"
           x-transition:leave="transition ease-in duration-150"
           x-transition:leave-start="opacity-100"
           x-transition:leave-end="opacity-0 translate-x-3">
        <span x-text="t.type==='success'?'✓':t.type==='error'?'✕':'·'"
              class="font-bold text-base leading-none mt-px flex-shrink-0"></span>
        <span x-text="t.msg" class="break-words"></span>
      </div>
    </template>
  </div>

  <!-- ══════════════════════════════════════════════════════════
       MOBILE TOP BAR
  ═══════════════════════════════════════════════════════════ -->
  <div id="mobile-bar">
    <button onclick="toggleSidebar()" class="icon-btn" aria-label="Menu">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2">
        <line x1="3" y1="6"  x2="21" y2="6"/>
        <line x1="3" y1="12" x2="21" y2="12"/>
        <line x1="3" y1="18" x2="21" y2="18"/>
      </svg>
    </button>
    <div style="display:flex;align-items:center;gap:.5rem">
      <div class="w-6 h-6 rounded flex items-center justify-center text-xs font-bold"
           style="background:var(--accent);color:#fff;font-size:.65rem">SF</div>
      <span class="text-sm font-semibold" style="color:var(--text)">SmartFood</span>
    </div>
  </div>

  <!-- Overlay -->
  <div id="sidebar-overlay" onclick="toggleSidebar()"></div>

  <!-- ══════════════════════════════════════════════════════════
       SIDEBAR
  ═══════════════════════════════════════════════════════════ -->
  <aside id="sidebar">
    <!-- Logo -->
    <div class="sidebar-logo">
      <div style="width:32px;height:32px;background:var(--accent);border-radius:.5rem;
                  display:flex;align-items:center;justify-content:center;
                  font-weight:700;font-size:.75rem;color:#fff;flex-shrink:0">SF</div>
      <div>
        <p style="font-size:.9rem;font-weight:700;color:var(--text);line-height:1.2">SmartFood</p>
        <p style="font-size:.65rem;color:var(--muted);line-height:1">Ops 360</p>
      </div>
    </div>

    <!-- Nav -->
    <nav style="flex:1;padding:.5rem 0">
      <p class="sidebar-section-label">Engenharia</p>
      <a href="/"              class="nav-item {% if active_page == 'cadastros' %}active{% endif %}">
        <span class="nav-icon">📦</span> Cadastros
      </a>
      <a href="/precos"        class="nav-item {% if active_page == 'cotacoes' %}active{% endif %}">
        <span class="nav-icon">💰</span> Cotações
      </a>
      <a href="/ficha-tecnica" class="nav-item {% if active_page == 'ficha' %}active{% endif %}">
        <span class="nav-icon">📋</span> Ficha Técnica
      </a>
      <a href="/compras"       class="nav-item {% if active_page == 'compras' %}active{% endif %}">
        <span class="nav-icon">📝</span> Compras
      </a>
      <a href="/labels"        class="nav-item {% if active_page == 'etiquetas' %}active{% endif %}">
        <span class="nav-icon">🏷️</span> Etiquetas
      </a>

      <hr style="border:none;border-top:1px solid var(--border);margin:.5rem .75rem">

      <p class="sidebar-section-label">Operação</p>
      <a href="/estoque"       class="nav-item {% if active_page == 'estoque' %}active{% endif %}">
        <span class="nav-icon">📊</span> Estoque
      </a>
      <a href="/clientes"      class="nav-item {% if active_page == 'clientes' %}active{% endif %}">
        <span class="nav-icon">👥</span> Clientes
      </a>
      <a href="/pedidos"       class="nav-item {% if active_page == 'pedidos' %}active{% endif %}">
        <span class="nav-icon">🧾</span> Pedidos
      </a>
      <a href="/dashboard"     class="nav-item {% if active_page == 'dashboard' %}active{% endif %}">
        <span class="nav-icon">📈</span> Dashboard
      </a>
    </nav>

    <!-- Bottom info -->
    <div style="padding:.75rem 1rem;border-top:1px solid var(--border)">
      <p style="font-size:.65rem;color:var(--muted)">v2.0 · Industrial Clean UI</p>
    </div>
  </aside>

  <!-- ══════════════════════════════════════════════════════════
       MAIN CONTENT
  ═══════════════════════════════════════════════════════════ -->
  <div id="main-wrap">
    <main id="page-content">
      {% block content %}{% endblock %}
    </main>
  </div>

  <!-- ══════════════════════════════════════════════════════════
       SHARED SCRIPTS
  ═══════════════════════════════════════════════════════════ -->
  <script>
  /* ── Toast manager ─────────────────────────────────────────── */
  function toastManager() {
    return {
      toasts: [],
      _counter: 0,
      show({ msg, type = 'info', duration = 3500 }) {
        const id = ++this._counter;
        this.toasts.push({ id, msg, type, visible: true });
        setTimeout(() => {
          const t = this.toasts.find(t => t.id === id);
          if (t) t.visible = false;
          setTimeout(() => { this.toasts = this.toasts.filter(t => t.id !== id); }, 200);
        }, duration);
      },
      onHtmx(e) {
        const xhr = e.detail.xhr;
        if (!xhr) return;
        const h = xhr.getResponseHeader('HX-Trigger');
        if (!h) return;
        try {
          const d = JSON.parse(h);
          if (d.showToast) this.show(d.showToast);
        } catch (_) {}
      },
    };
  }

  /* ── Global toast helper ────────────────────────────────────── */
  function toast(msg, type = 'success') {
    window.dispatchEvent(new CustomEvent('show-toast', { detail: { msg, type } }));
  }

  /* ── Sidebar toggle (mobile) ────────────────────────────────── */
  function toggleSidebar() {
    document.getElementById('sidebar').classList.toggle('open');
    document.getElementById('sidebar-overlay').classList.toggle('open');
  }
  </script>

  {% block scripts %}{% endblock %}
</body>
</html>
