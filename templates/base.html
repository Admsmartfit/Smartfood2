<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>{% block title %}SmartFood Ops 360{% endblock %}</title>

  <!-- Core libs -->
  <script src="https://unpkg.com/htmx.org@1.9.10"></script>
  <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>
  <script src="https://cdn.tailwindcss.com"></script>

  <!-- TomSelect (searchable combobox) -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/tom-select@2.3.1/dist/css/tom-select.min.css">
  <script src="https://cdn.jsdelivr.net/npm/tom-select@2.3.1/dist/js/tom-select.complete.min.js"></script>

  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">

  <style>
    /* ── Design tokens ──────────────────────────────────────────── */
    :root {
      --bg:      #0b1120;
      --surface: #111827;   /* gray-900 */
      --card:    #1f2937;   /* gray-800 */
      --border:  #374151;   /* gray-700 */
      --muted:   #6b7280;   /* gray-500 */
      --text:    #f9fafb;   /* gray-50  */
      --sub:     #9ca3af;   /* gray-400 */
      --blue:    #3b82f6;
      --blue-d:  #2563eb;
    }

    body {
      font-family: 'Outfit', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
    }

    /* ── Inputs ─────────────────────────────────────────────────── */
    input:not([type="checkbox"]):not([type="radio"]):not([type="range"]),
    select,
    textarea {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: .5rem;
      padding: .5rem .75rem;
      color: var(--text);
      min-height: 44px;
      width: 100%;
      transition: border-color .15s;
    }
    input:focus, select:focus, textarea:focus {
      border-color: var(--blue);
      outline: 2px solid rgba(59,130,246,.2);
    }
    input.error, select.error, textarea.error {
      border-color: #ef4444 !important;
      outline: 2px solid rgba(239,68,68,.2) !important;
    }
    select:disabled { opacity: .45; cursor: not-allowed; }

    /* ── Button system ──────────────────────────────────────────── */
    .btn {
      display: inline-flex; align-items: center; justify-content: center;
      min-height: 48px; border-radius: .625rem; font-weight: 600;
      padding: 0 1.25rem; transition: all .15s; cursor: pointer;
      border: none; gap: .4rem; font-size: .875rem;
    }
    .btn-primary   { background: var(--blue-d); color: #fff; }
    .btn-primary:hover   { background: var(--blue); }
    .btn-secondary { background: transparent; color: var(--sub); border: 1px solid var(--border); }
    .btn-secondary:hover { border-color: #9ca3af; color: var(--text); background: var(--card); }
    .btn-danger    { background: rgba(153,27,27,.3); color: #fca5a5; border: 1px solid rgba(239,68,68,.2); }
    .btn-danger:hover    { background: rgba(153,27,27,.5); }
    .btn-ghost     { background: transparent; color: var(--sub); }
    .btn-ghost:hover     { background: var(--card); color: var(--text); }
    .btn:disabled  { opacity: .5; cursor: not-allowed; pointer-events: none; }
    .btn-sm        { min-height: 36px; padding: 0 .75rem; font-size: .8rem; }
    .btn-full      { width: 100%; }

    /* Icon-only action button */
    .icon-btn {
      display: inline-flex; align-items: center; justify-content: center;
      min-width: 36px; min-height: 36px; border-radius: .5rem;
      background: transparent; border: none; cursor: pointer;
      transition: background .1s; font-size: 14px; color: var(--sub);
    }
    .icon-btn:hover { background: rgba(255,255,255,.07); }

    /* ── Cards / panels ─────────────────────────────────────────── */
    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: .875rem;
    }

    /* ── HTMX loading states ────────────────────────────────────── */
    .htmx-request .htmx-indicator { display: inline-block; }
    .htmx-indicator { display: none; }

    form.htmx-request .btn-primary,
    button.htmx-request.btn-primary {
      opacity: .65;
      pointer-events: none;
    }
    form.htmx-request .btn-primary::after {
      content: ' …';
    }

    /* ── TomSelect overrides ─────────────────────────────────────── */
    .ts-wrapper.single .ts-control {
      background: var(--card) !important;
      border: 1px solid var(--border) !important;
      border-radius: .5rem !important;
      color: var(--text) !important;
      min-height: 44px !important;
      padding: .5rem .75rem !important;
      box-shadow: none !important;
    }
    .ts-wrapper.single.focus .ts-control {
      border-color: var(--blue) !important;
      outline: 2px solid rgba(59,130,246,.2) !important;
    }
    .ts-dropdown {
      background: var(--card) !important;
      border: 1px solid var(--border) !important;
      border-radius: .5rem !important;
      color: var(--text) !important;
    }
    .ts-dropdown .option:hover, .ts-dropdown .option.active {
      background: rgba(59,130,246,.15) !important;
      color: #93c5fd !important;
    }
    .ts-dropdown .option.selected { background: rgba(59,130,246,.2) !important; }

    /* ── Top nav ─────────────────────────────────────────────────── */
    .nav-link {
      display: flex; align-items: center; gap: .35rem;
      padding: .35rem .7rem; border-radius: .5rem;
      font-size: .825rem; font-weight: 500; color: var(--sub);
      text-decoration: none; transition: color .1s, background .1s;
      white-space: nowrap;
    }
    .nav-link:hover { color: var(--text); background: var(--card); }
    .nav-link.active { color: #93c5fd; background: rgba(59,130,246,.12); }

    /* ── Inline edit field ─────────────────────────────────────── */
    .field {
      background: var(--card); border: 1px solid var(--border);
      border-radius: .5rem; padding: .4rem .6rem; color: var(--text);
      min-height: 40px;
    }
    .field:focus { border-color: var(--blue); outline: 2px solid rgba(59,130,246,.2); }

    [x-cloak] { display: none !important; }
  </style>

  {% block extra_head %}{% endblock %}
</head>
<body>

  <!-- ══════════════════════════════════════════════════════════
       GLOBAL TOAST MANAGER (Alpine, fixed top-right)
  ═══════════════════════════════════════════════════════════ -->
  <div x-data="toastManager()"
       @show-toast.window="show($event.detail)"
       @htmx:after-request.window="onHtmx($event)"
       class="fixed top-4 right-4 z-50 flex flex-col items-end gap-2 pointer-events-none"
       style="max-width:320px">
    <template x-for="t in toasts" :key="t.id">
      <div class="pointer-events-auto flex items-start gap-3 px-4 py-3 rounded-xl shadow-2xl
                  border text-sm font-medium leading-snug"
           :class="{
             'bg-gray-900 border-green-700/50 text-green-300': t.type === 'success',
             'bg-gray-900 border-red-700/50 text-red-300':   t.type === 'error',
             'bg-gray-900 border-blue-700/50 text-blue-300': t.type === 'info',
           }"
           x-show="t.visible"
           x-transition:enter="transition ease-out duration-200"
           x-transition:enter-start="opacity-0 translate-x-4"
           x-transition:enter-end="opacity-100 translate-x-0"
           x-transition:leave="transition ease-in duration-150"
           x-transition:leave-start="opacity-100"
           x-transition:leave-end="opacity-0">
        <span x-text="t.type === 'success' ? '✓' : t.type === 'error' ? '✕' : 'i'"
              class="font-bold text-base leading-none mt-px"></span>
        <span x-text="t.msg"></span>
      </div>
    </template>
  </div>

  <!-- ══════════════════════════════════════════════════════════
       TOP NAV
  ═══════════════════════════════════════════════════════════ -->
  <header class="sticky top-0 z-40 border-b"
          style="background:var(--surface); border-color:var(--border)">
    <div class="max-w-6xl mx-auto px-4 flex items-center h-14 gap-1 overflow-x-auto">
      <a href="/" class="flex items-center gap-2 mr-4 flex-shrink-0">
        <span class="text-blue-400 font-bold text-base tracking-tight">SmartFood</span>
        <span class="text-gray-600 text-xs hidden sm:inline">Ops 360</span>
      </a>
      <nav class="flex items-center gap-0.5 flex-shrink-0">
        <a href="/"              class="nav-link {% if active_page == 'cadastros' %}active{% endif %}">📦 Cadastros</a>
        <a href="/precos"        class="nav-link {% if active_page == 'cotacoes' %}active{% endif %}">💰 Cotações</a>
        <a href="/ficha-tecnica" class="nav-link {% if active_page == 'ficha' %}active{% endif %}">📋 Ficha</a>
        <a href="/compras"       class="nav-link {% if active_page == 'compras' %}active{% endif %}">🛒 Compras</a>
        <a href="/labels"        class="nav-link {% if active_page == 'etiquetas' %}active{% endif %}">🏷️ Etiquetas</a>
        <a href="/estoque"       class="nav-link {% if active_page == 'estoque' %}active{% endif %}">📊 Estoque</a>
        <a href="/clientes"      class="nav-link {% if active_page == 'clientes' %}active{% endif %}">👥 Clientes</a>
        <a href="/pedidos"       class="nav-link {% if active_page == 'pedidos' %}active{% endif %}">🛒 Pedidos</a>
        <a href="/dashboard"     class="nav-link {% if active_page == 'dashboard' %}active{% endif %}">📈 Dashboard</a>
      </nav>
    </div>
  </header>

  <!-- ══════════════════════════════════════════════════════════
       PAGE CONTENT
  ═══════════════════════════════════════════════════════════ -->
  <main class="max-w-6xl mx-auto px-4 py-6">
    {% block content %}{% endblock %}
  </main>

  <!-- ══════════════════════════════════════════════════════════
       SHARED SCRIPTS
  ═══════════════════════════════════════════════════════════ -->
  <script>
  function toastManager() {
    return {
      toasts: [],
      _counter: 0,
      show({ msg, type = 'info', duration = 3000 }) {
        const id = ++this._counter;
        this.toasts.push({ id, msg, type, visible: true });
        setTimeout(() => {
          const t = this.toasts.find(t => t.id === id);
          if (t) t.visible = false;
          setTimeout(() => { this.toasts = this.toasts.filter(t => t.id !== id); }, 200);
        }, duration);
      },
      onHtmx(e) {
        const xhr = e.detail.xhr;
        if (!xhr) return;
        const triggerHeader = xhr.getResponseHeader('HX-Trigger');
        if (!triggerHeader) return;
        try {
          const data = JSON.parse(triggerHeader);
          if (data.showToast) this.show(data.showToast);
        } catch (_) {}
      },
    };
  }

  // Helper: fire a toast from anywhere
  function toast(msg, type = 'success') {
    window.dispatchEvent(new CustomEvent('show-toast', { detail: { msg, type } }));
  }
  </script>

  {% block scripts %}{% endblock %}
</body>
</html>
